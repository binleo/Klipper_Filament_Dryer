#This macro set was customized for my personal use and is shared freely for anyone who might find it helpful.
#Please note that using the heated bed to dry filament for extended periods may pose thermal risks to your equipment.
#Upload the filament_dryer.cfg to your printer and add [include filament_dryer.cfg] into the prtinter.cfg.
#Thankto NameOfTheDragon


[gcode_macro START_DRYER]
description: Start the heated bed filament dryer.
gcode:
    {% set ChamberTemperature = params.CHAMBER_TEMP | default(25.0) | float %}
    {% set BedTemperature = params.BED_TEMP | default(50.0) | float %}
    # Get Hour
    {% set DryTimeHours = params.TIME_HOURS | default(4.0) | float %}   
    # Covert hour to second (int)
    {% set DryTimeSeconds = (DryTimeHours * 3600) | int %}    
    M140 S{BedTemperature}      
    M141 S{ChamberTemperature}      
    # SET parameters to DRYER_STATUS
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining VALUE={DryTimeSeconds}
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=bed_temperature VALUE={BedTemperature}
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=chamber_temperature VALUE={ChamberTemperature}
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=1

[gcode_macro STOP_DRYER]
description: STOP Filament Dryer
gcode:
    ; Turn off heaters etc. here
    M140 S0 ; Disable bed heater
    M141 S0 ; [OPTIONAL] Disable enclosure heater/fan
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining VALUE=0
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=0    ; Stop the timer.
    M117 Drying Stopped

[gcode_macro DRYER_STATUS]
description: CHECK DRY REMAINING
variable_time_remaining: 0
variable_bed_temperature: 0
variable_chamber_temperature: 0
gcode:
    {% if time_remaining > 0 %}
        M140 S{bed_temperature} ; Reset bed temperature (prevents timeout)
        SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining VALUE={time_remaining - 1}
        
        #Convert time:
        {% set hours = (time_remaining / 3600) | int %}
        {% set minutes = ((time_remaining % 3600) / 60) | int %}
        {% set seconds = (time_remaining % 60) | int %}
        
        #Display Dry time remaining in to GUI
        M117 Dry time remaining: {"%02d:%02d:%02d" % (hours, minutes, seconds)}
    {% else %}
        STOP_DRYER
    {% endif %}

[delayed_gcode DRYER_TIMER]
gcode:
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=1
    DRYER_STATUS

[gcode_macro DRY_PLA]
description: PLA DRYER (BED: 50°C, Chamber: 25°C, 4 Hours)
gcode:
    START_DRYER BED_TEMP=50 CHAMBER_TEMP=25 TIME_HOURS=4

[gcode_macro DRY_PETG]
description: PETG DRYER (BED: 55°C, Chamber: 30°C, 5 Hours)
gcode:
    START_DRYER BED_TEMP=55 CHAMBER_TEMP=30 TIME_HOURS=5

[gcode_macro DRY_ABS]
description: ABS DRYER (BED: 65°C, Chamber: 40°C, 4 Hours)
gcode:
    START_DRYER BED_TEMP=65 CHAMBER_TEMP=40 TIME_HOURS=4